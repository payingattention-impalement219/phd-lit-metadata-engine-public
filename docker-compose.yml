services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_PATH: /app/data/metadata.sqlite
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./notebooks:/app/notebooks
      - ./configs:/app/configs
      - ./backend/app:/app/backend/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tailwind.config.js:/app/frontend/tailwind.config.js
      - ./frontend/postcss.config.js:/app/frontend/postcss.config.js
    ports:
      - "5173:5173"
    depends_on:
      - backend

  notebook:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --ServerApp.token=
      - --ServerApp.password=
      - /app/notebooks/01_metadata_analysis.ipynb
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/metadata.sqlite
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./notebooks:/app/notebooks
      - ./protocol:/app/protocol
      - ./configs:/app/configs
      - ./backend:/app/backend
    ports:
      - "8888:8888"
    profiles:
      - notebook
